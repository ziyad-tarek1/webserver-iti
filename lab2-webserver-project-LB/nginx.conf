# =============================================================================
# Nginx sits in front of 3 Apache containers (web1, web2, web3) and distributes
# incoming requests across them. Each refresh may hit a different backend.
# =============================================================================

# Single worker process 
worker_processes 1;

# Event loop: max connections each worker can handle
events {
    worker_connections 1024;
}

http {
    # MIME types for correct Content-Type headers (e.g. text/html, image/png)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # UPSTREAM: Define the pool of backend servers
    # -------------------------------------------------------------------------
    # Nginx will round-robin requests across these servers by default.
    # web1, web2, web3 = Docker Compose service names (DNS resolves on internal network)
    # No need for IPs - Docker's built-in DNS handles service discovery.
    upstream web_cluster {
        server web1:80;
        server web2:80;
        server web3:80;
    }

    # -------------------------------------------------------------------------
    # SERVER: Listen for incoming requests
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # All requests go to the upstream cluster
        location / {
            # Forward to one of the upstream servers (load balancing happens here)
            proxy_pass http://web_cluster;

            # Pass original request info to the backend (Apache needs these)
            proxy_set_header Host $host;                    # Original Host header
            proxy_set_header X-Real-IP $remote_addr;        # Client's real IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Proxy chain
        }
    }
}
