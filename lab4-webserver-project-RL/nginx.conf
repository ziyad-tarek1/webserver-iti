# =============================================================================
# Nginx Rate Limiting Demo
# =============================================================================
# Load balancer that limits how many requests each client IP can make per second.
# Protects backend from abuse, DDoS, or accidental traffic spikes.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Rate limit zone - defines the "rules" for limiting (used later in location)
    # -------------------------------------------------------------------------
    # $binary_remote_addr = client IP (binary = smaller memory, ~64 bytes per IP)
    # zone=req_limit:10m = shared memory zone named "req_limit", 10MB size
    #   (10MB ≈ 160,000 IPs tracked; each IP gets its own counter)
    # rate=5r/s = allow 5 requests per second per IP on average
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=5r/s;

    # -------------------------------------------------------------------------
    # Upstream: backend servers (same as load balancer lab)
    # -------------------------------------------------------------------------
    upstream web_cluster {
        server web1:80;
        server web2:80;
        server web3:80;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            # -----------------------------------------------------------------
            # Apply rate limit to this location
            # -----------------------------------------------------------------
            # zone=req_limit = use the zone defined above
            # burst=3 = allow a "burst" of 3 extra requests when rate is exceeded
            #   (smooths out short spikes; requests beyond burst get 429)
            # nodelay = serve burst requests immediately (don't queue/delay them)
            #   Without nodelay, excess requests wait in queue; with nodelay they
            #   either get served (if burst available) or 429 right away
            limit_req zone=req_limit burst=3 nodelay;

            # Return 429 Too Many Requests when limit is exceeded (default: 503)
            limit_req_status 429;

            # Forward allowed requests to the backend cluster
            proxy_pass http://web_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
