# Nginx Rate Limiting Demo - Load balancer with request rate limiting
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limit zone: 5 requests/second per IP (10m = ~160k IPs)
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=5r/s;

    # Upstream: Docker Compose service names resolve on the internal network
    upstream web_cluster {
        server web1:80;
        server web2:80;
        server web3:80;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://web_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
