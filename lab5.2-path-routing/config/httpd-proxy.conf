# Lab 5.2 - Apache Path-Based Routing (included from httpd.conf)
# /app1 → web1, /app2 → web2, /app3 → web3 (like Nginx in Lab 3)

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

<VirtualHost *:80>
    ProxyPreserveHost On

    ProxyPass /app1  http://web1:80/
    ProxyPassReverse /app1  http://web1:80/

    ProxyPass /app2  http://web2:80/
    ProxyPassReverse /app2  http://web2:80/

    ProxyPass /app3  http://web3:80/
    ProxyPassReverse /app3  http://web3:80/
</VirtualHost>
