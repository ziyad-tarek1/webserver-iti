# =============================================================================
# Lab 5.2 - Apache Path-Based Routing (included from httpd.conf)
# =============================================================================
# Routes requests by URL path: /app1→web1, /app2→web2, /app3→web3 (same idea as Lab 3/Nginx).
# No load balancing — each path maps to exactly one backend.
# =============================================================================

# Load modules for reverse proxy (no balancer needed for path routing)
LoadModule proxy_module modules/mod_proxy.so          # Core reverse proxy
LoadModule proxy_http_module modules/mod_proxy_http.so # HTTP protocol support for proxy

<VirtualHost *:80>
    # Pass the original Host header to backends (needed for virtual hosts, logging)
    ProxyPreserveHost On

    # -------------------------------------------------------------------------
    # Path-based routing: each path prefix goes to a specific backend
    # -------------------------------------------------------------------------
    # ProxyPass /app1 http://web1:80/  → requests to /app1 or /app1/* go to web1:80/
    # The trailing slash on the target means /app1 is stripped, e.g. /app1/foo → web1:80/foo
    ProxyPass /app1  http://web1:80/
    ProxyPassReverse /app1  http://web1:80/   # Fix Location/Redirect headers in responses

    ProxyPass /app2  http://web2:80/
    ProxyPassReverse /app2  http://web2:80/

    ProxyPass /app3  http://web3:80/
    ProxyPassReverse /app3  http://web3:80/
</VirtualHost>
