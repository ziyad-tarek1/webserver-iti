# =============================================================================
# LAB 5: Docker Compose - Apache .htaccess Lab (Simple Demo)
# =============================================================================
# Run: docker compose up -d --build
# Credentials: admin / secret (from htdocs/secure/.htpasswd)
# =============================================================================

services:
  apache:
    build:
      context: .
      dockerfile: Dockerfile
    image: apache-htaccess:latest
    container_name: apache-htaccess

    ports:
      - "${PORT:-80}:80"

    # Mount htdocs as web root - .htpasswd lives in htdocs/secure/
    volumes:
      - ./htdocs:/usr/local/apache2/htdocs:ro

    restart: unless-stopped

    # Healthcheck: Docker pings http://localhost/ every 10s
    # If 3 retries fail, container is marked unhealthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
