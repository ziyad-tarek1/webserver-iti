# Production-grade Apache custom configuration
# Included from main httpd.conf; extends default settings

# -----------------------------------------------------------------------------
# Security: Enable .htaccess and mod_rewrite
# -----------------------------------------------------------------------------
<Directory "/usr/local/apache2/htdocs">
    AllowOverride All
    Require all granted
</Directory>

# -----------------------------------------------------------------------------
# Security Headers - mitigate common web vulnerabilities
# -----------------------------------------------------------------------------
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# -----------------------------------------------------------------------------
# Custom Error Pages - better UX than default Apache errors
# Paths are relative to DocumentRoot
# -----------------------------------------------------------------------------
ErrorDocument 401 /errors/401.html
ErrorDocument 403 /errors/403.html
ErrorDocument 404 /errors/404.html
ErrorDocument 500 /errors/500.html
