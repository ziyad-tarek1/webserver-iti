# =============================================================================
# LAB 5: Apache Custom Configuration
# =============================================================================
# This file is included from the main httpd.conf.
# It enables .htaccess, adds security headers, and custom error pages.
# =============================================================================

# -----------------------------------------------------------------------------
# CRITICAL: Enable .htaccess processing
# -----------------------------------------------------------------------------
# AllowOverride All = Apache will READ and APPLY .htaccess files in directories
# Without this, .htaccess files are IGNORED (Apache default is often "None")
# Require all granted = allow access by default (we restrict in .htaccess per dir)
<Directory "/usr/local/apache2/htdocs">
    AllowOverride All
    Require all granted
</Directory>

# -----------------------------------------------------------------------------
# Security Headers - protect against common web attacks
# -----------------------------------------------------------------------------
# X-Content-Type-Options: prevents MIME type sniffing (e.g. treat .txt as .html)
# X-Frame-Options: prevents clickjacking (embedding our site in iframe)
# X-XSS-Protection: enables browser XSS filter
# Referrer-Policy: controls how much URL info is sent when user clicks links
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# -----------------------------------------------------------------------------
# Custom Error Pages - friendly messages instead of default Apache errors
# -----------------------------------------------------------------------------
# When Apache returns 401/403/404/500, it serves these HTML files instead
# Paths are relative to DocumentRoot (htdocs)
ErrorDocument 401 /errors/401.html
ErrorDocument 403 /errors/403.html
ErrorDocument 404 /errors/404.html
ErrorDocument 500 /errors/500.html
