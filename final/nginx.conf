# =============================================================================
# Nginx Rate Limiting Demo
# =============================================================================
# Load balancer that limits how many requests each client IP can make per second.
# Protects backend from abuse, DDoS, or accidental traffic spikes.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Rate limit zone - defines the "rules" for limiting (used later in location)
    # -------------------------------------------------------------------------
    # $binary_remote_addr = client IP (binary = smaller memory, ~64 bytes per IP)
    # zone=req_limit:10m = shared memory zone named "req_limit", 10MB size
    #   (10MB ≈ 160,000 IPs tracked; each IP gets its own counter)
    # rate=5r/s = allow 5 requests per second per IP on average
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=2r/s;


    server {
        listen 80;
        server_name localhost;

        location /v1/admin/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://adminv1:80/;
            proxy_set_header Host $host;    
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v2/admin/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://adminv2:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v1/cart/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://cartv1:80/;
            proxy_set_header Host $host;    
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v2/cart/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://cartv2:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v1/shop/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://shopv1:80/;
            proxy_set_header Host $host;    
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v2/shop/ {
            limit_req zone=req_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://shopv2:80/;
            proxy_set_header Host $host;    
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
