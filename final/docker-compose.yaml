services:
  # === v1 (Apache - Current/Blue) ===
  adminv1:
    image: httpd:latest
    ports:
      - "8081:80"
    volumes:
      - ./v1/admin:/usr/local/apache2/htdocs/

  cartv1:
    image: httpd:latest
    ports:
      - "8082:80"
    volumes:
      - ./v1/cart:/usr/local/apache2/htdocs/

  shopv1:
    image: httpd:latest
    ports:
      - "8083:80"
    volumes:
      - ./v1/shop:/usr/local/apache2/htdocs/

  # === v2 (Nginx - New/Green) ===
  adminv2:
    image: nginx:latest
    ports:
      - "8084:80"
    volumes:
      - ./v2/admin:/usr/share/nginx/html/

  cartv2:
    image: nginx:latest
    ports:
      - "8085:80"
    volumes:
      - ./v2/cart:/usr/share/nginx/html/

  shopv2:
    image: nginx:latest
    ports:
      - "8086:80"
    volumes:
      - ./v2/shop:/usr/share/nginx/html/

  # === Caddy Reverse Proxy ===
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./maintenance:/srv/maintenance:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - adminv1
      - cartv1
      - shopv1
      - adminv2
      - cartv2
      - shopv2
    environment:
      - CADDY_AGREE=true

volumes:
  caddy_data:
  caddy_config:
