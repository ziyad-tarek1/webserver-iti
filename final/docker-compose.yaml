services:
  adminv1:
    image: httpd:latest
    ports:
      - "8081:80"
    volumes:
      - ./v1/admin:/usr/local/apache2/htdocs/

  cartv1:
    image: httpd:latest
    ports:
      - "8082:80"
    volumes:
      - ./v1/cart:/usr/local/apache2/htdocs/

  shopv1:
    image: httpd:latest
    ports:
      - "8083:80"
    volumes:
      - ./v1/shop:/usr/local/apache2/htdocs/

  adminv2:
    image: nginx:latest
    ports:
      - "8084:80"
    volumes:
      - ./v2/admin:/usr/share/nginx/html/

  cartv2:
    image: nginx:latest
    ports:
      - "8085:80"
    volumes:
      - ./v2/cart:/usr/share/nginx/html/

  shopv2:
    image: nginx:latest
    ports:
      - "8086:80"
    volumes:
      - ./v2/shop:/usr/share/nginx/html/

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - adminv1
      - cartv1
      - shopv1
