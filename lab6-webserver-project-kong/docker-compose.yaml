# Kong API Gateway (dbless) + 3 Nginx apps with path-based routing
# Gateway: http://localhost:8000/app1 | /app2 | /app3
# Direct:  http://localhost:8081 | 8082 | 8083

services:
  kong:
    image: kong:3.4
    container_name: kong-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - kong-net

  app1:
    image: nginx:alpine
    container_name: nginx-app1
    ports:
      - "8081:80"
    volumes:
      - ./app1:/usr/share/nginx/html:ro
    networks:
      - kong-net

  app2:
    image: nginx:alpine
    container_name: nginx-app2
    ports:
      - "8082:80"
    volumes:
      - ./app2:/usr/share/nginx/html:ro
    networks:
      - kong-net

  app3:
    image: nginx:alpine
    container_name: nginx-app3
    ports:
      - "8083:80"
    volumes:
      - ./app3:/usr/share/nginx/html:ro
    networks:
      - kong-net

networks:
  kong-net:
    driver: bridge
