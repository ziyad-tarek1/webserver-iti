# Lab 5.1 - Apache Load Balancing (like Lab 2, but with Apache only)
# 3 backends + 1 Apache proxy that round-robins requests

services:
  web1:
    image: httpd:2.4-alpine
    volumes:
      - ./web1:/usr/local/apache2/htdocs/
  web2:
    image: httpd:2.4-alpine
    volumes:
      - ./web2:/usr/local/apache2/htdocs/
  web3:
    image: httpd:2.4-alpine
    volumes:
      - ./web3:/usr/local/apache2/htdocs/

  proxy:
    build: .
    ports:
      - "80:80"
    depends_on:
      - web1
      - web2
      - web3
