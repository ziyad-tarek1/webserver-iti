# =============================================================================
# Lab 5.1 - Apache Load Balancer (included from httpd.conf)
# =============================================================================
# Round-robin load balancing across web1, web2, web3 (same idea as Lab 2/Nginx).
# Each request is sent to the next backend in the pool.
# =============================================================================

# Load required modules for reverse proxy and load balancing
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so      # Shared memory for balancer state
LoadModule proxy_module modules/mod_proxy.so                   # Core reverse proxy
LoadModule proxy_http_module modules/mod_proxy_http.so          # HTTP protocol support for proxy
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so  # Load balancing across backends
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so  # Round-robin algorithm

<VirtualHost *:80>
    # -------------------------------------------------------------------------
    # Define the backend pool (balancer cluster)
    # -------------------------------------------------------------------------
    # <Proxy balancer://name> creates a named pool. BalancerMember lists each backend.
    # lbmethod=byrequests (default) = round-robin: 1st request→web1, 2nd→web2, 3rd→web3, repeat.
    <Proxy balancer://webcluster>
        BalancerMember http://web1:80
        BalancerMember http://web2:80
        BalancerMember http://web3:80
    </Proxy>

    # Pass the original Host header to backends (needed for virtual hosts, logging)
    ProxyPreserveHost On

    # Send all requests (/) to the balancer; proxy forwards to one of the members
    ProxyPass / balancer://webcluster/
    # Fix Location/Redirect headers in backend responses so they point to the proxy, not backend
    ProxyPassReverse / balancer://webcluster/
</VirtualHost>
