# Lab 5.1 - Apache Load Balancer (included from httpd.conf)
# Round-robin across web1, web2, web3 (like Nginx in Lab 2)

LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so

<VirtualHost *:80>
    # Backend pool - round-robin by default
    <Proxy balancer://webcluster>
        BalancerMember http://web1:80
        BalancerMember http://web2:80
        BalancerMember http://web3:80
    </Proxy>

    ProxyPreserveHost On
    ProxyPass / balancer://webcluster/
    ProxyPassReverse / balancer://webcluster/
</VirtualHost>
